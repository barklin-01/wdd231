<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Thank You - Barkline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .box {
            background: #f5f5f5;
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 10px;
            text-align: left;
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);

            const formType = params.get("formType");

            const firstName = params.get("firstName");
            const lastName = params.get("lastName");
            const email = params.get("email");
            const phone = params.get("phone");
            const purpose = params.get("purpose");
            const description = params.get("description");

            // Cambiar título dinámico
            const title = document.getElementById("title");

            if (formType === "subscribe") {
                title.textContent = "🎉 Thanks for subscribing!";
            } else {
                title.textContent = "📩 Thanks for contacting us!";
            }

            // Insertar datos básicos
            document.getElementById("firstName").textContent = firstName || "-";
            document.getElementById("email").textContent = email || "-";

            // Mostrar campos solo si existen
            if (lastName) {
                document.getElementById("lastNameBox").style.display = "block";
                document.getElementById("lastName").textContent = lastName;
            }

            if (phone) {
                document.getElementById("phoneBox").style.display = "block";
                document.getElementById("phone").textContent = phone;
            }

            if (purpose) {
                document.getElementById("purposeBox").style.display = "block";
                document.getElementById("purpose").textContent = purpose;
            }

            if (description) {
                document.getElementById("descriptionBox").style.display = "block";
                document.getElementById("description").textContent = description;
            }
        });
    </script>
</head>

<body>
    <div class="container">
        <h1 id="title">Thank You!</h1>
        <p>Your information has been received successfully.</p>

        <div class="box">
            <p><strong>First Name:</strong> <span id="firstName"></span></p>

            <div id="lastNameBox" style="display:none;">
                <p><strong>Last Name:</strong> <span id="lastName"></span></p>
            </div>

            <p><strong>Email:</strong> <span id="email"></span></p>

            <div id="phoneBox" style="display:none;">
                <p><strong>Phone:</strong> <span id="phone"></span></p>
            </div>

            <div id="purposeBox" style="display:none;">
                <p><strong>Purpose:</strong> <span id="purpose"></span></p>
            </div>

            <div id="descriptionBox" style="display:none;">
                <p><strong>Description:</strong> <span id="description"></span></p>
            </div>
        </div>

        <br>
        <a href="siteplan.html">⬅ Back to Home</a>
    </div>
</body>

</html>
