<body>
    <header>
        <img src="images/logo1.webp" alt="Logo of the store">
        <span id="name-page"> Online Store | Barkline</span>
        <button id="menu-button" aria-label="Menu">&#9776;</button>
        <nav class="links">
            <ul>
                <li><a href="siteplan.html">Home</a></li>
                <li><a href="store.html">Store</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="herotext">
            <h1 class="title-1">Barkline</h1>
            <p >CULTURE AND TRADITION</p>
        </div>
            <div class="contenedorform">
                <h1>Contact Us</h1>
            
                <form method="get" action="thankyou.html">
                    <input type="hidden" name="formType" value="contact">
                    <label>
                        First Name:
                        <input type="text" name="firstName" required title="Enter your first name" autocomplete="given-name">
                    </label>
            
                    <label>
                        Last Name:
                        <input type="text" name="lastName" required title="Enter your last name" autocomplete="family-name">
                    </label>

                    <label>
                        Email:
                        <input type="email" name="email" required title="Enter a valid email" autocomplete="email"
                            placeholder="example@mail.com">
                    </label>
            
                    <label>
                        Mobile Phone:
                        <input type="tel" name="phone" required title="Enter your mobile phone number" autocomplete="tel">
                    </label>
            
                    <label>
                        How can we help you?
                        <select name="purpose" required title="Select an option">
                            <option value="">-- Select one option --</option>
                            <option value="purchasing_assistant">Purchasing assistant</option>
                            <option value="special_shipments">Special shipments</option>
                            <option value="custom_clothing">Ropa personalizada</option>
                            <option value="returns_claims">Returns or claims</option>
                            <option value="other">Other</option>
                        </select>
                    </label>
            
                    <label>
                        Business Description:
                        <textarea name="description" title="Describe your business"></textarea>
                    </label>
            
                    <input type="hidden" name="timestamp" id="timestamp">
            
                    <input type="submit" value="Submit Application">
            
                </form>
            </div>
    </main>

    <footer>
        <div class="footer-left">
            <p><strong>Barkline Online Store</strong><br>
                Otavalo, Ecuador<br>
                barklin2003@gmail.com<br>
                +593 993 912 331</p>
        </div>

        <nav class="redes">

            <a href="https://www.linkedin.com/in/barklin-daniel-gonzalez-tuqerez/"><img src="images/linkedin.svg"
                    alt="LinkedIn"></a>
            <a href="https://www.facebook.com/barklin.gonzalez.5"> <img src="images/facebook.svg"
                    alt="Facebook Icon"></a>
            <a href="https://www.instagram.com/barklin_2003/"> <img src="images/instagram.svg" alt="Instagram Icon"></a>
        </nav>
        <div class="footer-right">
            <p>WDD 231 Class Project</p>
            <p>Barklin Gonzalez</p>
            <p class="foter">
                © <span id="currentyear"></span> 🍀Barkline Online Store🍀</p>
            <p id="lastModified"></p>
        </div>
    </footer>
