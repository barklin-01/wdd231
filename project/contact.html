<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WDD 131-Final Project about a store call Bordados Sayde">
    <meta name="author" content="Barklin Gonzalez">
    <title>Bordados Sayde Store - Barklin Gonzalez</title>
    <link rel="stylesheet" href="stylesproject/siteplan.css">
    <link rel="stylesheet" href="stylesproject/contact.css">
    <script src="scripts-project/siteplan.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Amarante&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">


</head>

<body>
    <header>
        <div class="header-top">
            <img src="imgs/logo.jpg" alt="Logo of the store">
            <button id="menu-button" aria-label="Menu">&#9776;</button>
        </div>
    
        <nav>
            <ul>
                <li><a href="siteplan.html">Home</a></li>
                <li><a href="store.html">Store</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
<main>
    <div class="herotext">
        <h1 class="title-1">Bordados Sayde</h1>
        <p>CULTURE AND TRADITION</p>
    </div>
    
    <div class="information">
        <p>Street Bolivar and Street Salinas</p>
        <p>OTAVALO - ECUADOR</p>
        <p> +593 993912331 / +593 983244967</p>
        <p>Bordados-sayde.2001@gmail.com</p>
    </div>
    <div class="form-section">
        <div class="map">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1677.4985626745356!2d-78.26269541613031!3d0.229001961354005!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e2a149a827a5c27%3A0x66fbc0659df27bec!2sC%2F%20Salinas%20402%2C%20Otavalo!5e0!3m2!1sen!2sec!4v1764454732312!5m2!1sen!2sec"
                width="600" height="450" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <section class=" contact-form">
            <form id="contactForm">
                <label for="username"> Name:</label>
                <input type="text" id="username" name="username">

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email">
                <p>Message purpose:</p>
                <div class="opcion">
                    <label>
                        <input type="radio" name="purpose" id="inquiry" value="General Inquiry" required>
                        Information
                    </label>

                    <label>
                        <input type="radio" id="reservation" name="purpose" value="Reservation Question">
                        Orders
                    </label>

                    <label>
                        <input type="radio" id="suggestion" name="purpose" value="Website Suggestion">
                        Others
                    </label>
                </div>
                <label for="message">Message:</label>
                <textarea name="message" id="message" rows="4"></textarea>

                <button type="submit" class="button"> Get in Touch!</button>
            </form>
        </section>
    </div>
</main>
    <footer>
        <p>
            © <span id="currentyear"></span> 🍀Barklin Daniel Gonzalez🍀Ecuador</p>
        <p id="lastModified"></p>
    </footer>

</body>

</html>
